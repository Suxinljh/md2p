[build]
  # 发布目录
  publish = "dist"
  # 构建命令
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20.19.0"

# 重定向规则（SPA 路由支持）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 缓存静态资源
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# 压缩配置
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    # Netlify 会自动启用 gzip 和 brotli 压缩
